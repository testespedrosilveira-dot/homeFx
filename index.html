<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    body { margin: 0; }
    #p5-holder { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<div id="p5-holder"></div>

<script>
new p5((p) => {

  const fileNames = [
    "https://picsum.photos/200?1",
    "https://picsum.photos/200?2"
  ];

  let imgs = [];
  let loaded = 0;

  fileNames.forEach((url, i) => {
    p.loadImage(url, img => {
      imgs[i] = img;
      loaded++;
    });
  });

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight).parent("p5-holder");
  };

  p.draw = () => {
    p.background(220);

    if (loaded < fileNames.length) {
      p.fill(0);
      p.text("loading...", 20, 20);
      return;
    }

    p.image(imgs[0], 100, 100);
  };

});
</script>

</body>
</html>
