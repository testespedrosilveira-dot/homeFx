<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;height:100%;overflow:hidden;background:#fff;font-family:Arial,Helvetica,sans-serif}
.stage{position:relative;width:100vw;height:100vh}
.slide{position:absolute;left:50%;top:50%;width:500px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:430px;font-weight:400;color:#c3c3c3;transition:.45s cubic-bezier(.22,.61,.36,1),opacity .35s}
.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:420px;aspect-ratio:1;background:#b3b3b3;border:12px solid #fff;z-index:10;transition:background .25s}
</style></head><body><div class=stage><div id=t></div><div id=b class=center></div></div><script>
const chars=["P","P","P","S","S"],SIDE=.52,GAP=70,STEP=570;
const slides=chars.map(c=>{let d=document.createElement("div");d.className="slide";d.textContent=c;t.appendChild(d);return d});
let cur=0;
const col=()=>`hsl(${Math.random()*360},90%,55%)`;
function r(){
 slides.forEach((s,i)=>{
 let diff=i-cur;if(diff>2.5)diff-=5;if(diff<-2.5)diff+=5;
 let sc=SIDE,o=0,z=1;
 if(diff===0){sc=1;o=1;z=3;}
 else if(Math.abs(diff)===1){o=.82;z=2;}
 s.style.opacity=o;s.style.zIndex=z;
 s.style.transform=`translate(-50%,-50%) translate(${diff*STEP}px,0) scale(${sc})`;
 });
}
r();
setInterval(()=>{cur=(cur+1)%5;b.style.background=col();r();},1000);
</script></body></html>
