<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedro Silveira</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

width:100%;
height:100%;

overflow:hidden;

background:#ffffff;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial,Helvetica,sans-serif;

}

.card{

width:min(720px,56vw);

aspect-ratio:.72;

padding:12px;

background:#ffffff;

cursor:pointer;

}

.card-fill{

width:100%;
height:100%;

background:#d2d2d2;

display:flex;
justify-content:center;
align-items:center;

transition:
background-color .22s ease;

}

.video{

width:72%;

aspect-ratio:9/16;

overflow:hidden;

box-shadow:
0 10px 40px rgba(0,0,0,.08);

will-change:transform;

}

.video iframe{

width:100%;
height:100%;

border:none;

display:block;

}

@media (max-width:900px){

.card{

width:90vw;

}

.video{

width:74%;

}

}
  
</style>

</head>

<body>

<div class="card">

    <div class="card-fill">

        <div class="video" id="video">

            <iframe
            src="https://customer-pz1quf3nakoocijj.cloudflarestream.com/1fd7b59118fcf10ef100d22f0053cecc/iframe?autoplay=true&muted=true&loop=true&controls=false"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen>
            </iframe>

        </div>

    </div>

</div>

<script>

const card = document.querySelector(".card");
const fill = document.querySelector(".card-fill");
const video = document.getElementById("video");

function randomColor(){

    return `hsl(${Math.random()*360},90%,60%)`;

}

card.addEventListener("mouseenter",()=>{

    fill.style.backgroundColor = randomColor();

});

let targetX = 0;
let targetY = 0;

let currentX = 0;
let currentY = 0;

window.addEventListener("mousemove",(e)=>{

    const x = e.clientX / window.innerWidth - .5;
    const y = e.clientY / window.innerHeight - .5;

    targetX = x * 14;
    targetY = y * 14;

});

function animate(){

    currentX += (targetX-currentX)*0.08;
    currentY += (targetY-currentY)*0.08;

    video.style.transform =
    `translate(${currentX}px, ${currentY}px)`;

    requestAnimationFrame(animate);

}

animate();

</script>

</body>

</html>
