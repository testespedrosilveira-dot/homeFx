<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Carousel</title>
<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#fff;
}
.stage{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#fff;
}
.track{
  position:absolute;
  inset:0;
}
.slide{
  position:absolute;
  top:50%;
  left:50%;
  width:320px;
  aspect-ratio:9/16;
  max-width:80vw;
  max-height:80vh;
  overflow:hidden;
  will-change:transform,opacity;
  transition:
    transform .9s cubic-bezier(.22,.61,.36,1),
    opacity .55s ease;
}
.slide iframe{
  width:100%;
  height:100%;
  border:none;
  display:block;
  pointer-events:none;
  transform:scale(1.02);
}
.frame{
  position:absolute;
  top:50%;
  left:50%;
  width:320px;
  aspect-ratio:9/16;
  max-width:80vw;
  max-height:80vh;
  transform:translate(-50%,-50%);
  border:12px solid #fff;
  box-sizing:content-box;
  background:transparent;
  transition:border-color .25s ease;
  z-index:5;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="stage">
  <div class="track" id="track"></div>
  <div class="frame" id="frame"></div>
</div>

<script>
(() => {

const CUSTOMER_CODE="customer-pz1quf3nakoocijj";

const VIDEO_IDS=[
"1fd7b59118fcf10ef100d22f0053cecc",
"f09759da687fe6aaeb7bd22f7f03bff5",
"6d97c67e06de8e46261a04f5aa650101",
"9a4cd544eedbf78b953fd6c7f006cb86",
"ad4c9b16f0d4e990e15fe7314cdf29fd"
];

const link="https://p-silveira.com/collection/";

const GAP=96;
const SCALE_CENTER=1.18;
const SCALE_OUT=.88;

const track=document.getElementById("track");
const frame=document.getElementById("frame");

const randomColor=()=>`hsl(${Math.random()*360},90%,55%)`;

const slides=VIDEO_IDS.map(id=>{
    const s=document.createElement("div");
    s.className="slide";

    const iframe=document.createElement("iframe");
    iframe.src=`https://${CUSTOMER_CODE}.cloudflarestream.com/${id}/iframe?autoplay=true&muted=true&loop=true&controls=false&preload=auto`;
    iframe.allow="autoplay; encrypted-media; picture-in-picture";
    iframe.loading="lazy";

    s.appendChild(iframe);
    track.appendChild(s);

    return s;
});

const total=slides.length;
let current=0;

function slideWidth(){
    return slides[0].getBoundingClientRect().width;
}

function render(){

    const step=slideWidth()+GAP;

    slides.forEach((slide,i)=>{

        let diff=i-current;

        if(diff>total/2) diff-=total;
        if(diff<-total/2) diff+=total;

        const x=diff*step;

        let scale=SCALE_OUT;
        let opacity=0;
        let z=1;

        if(diff===0){
            scale=SCALE_CENTER;
            opacity=1;
            z=3;
        }
        else if(diff===-1 || diff===1){
            opacity=.72;
            scale=SCALE_OUT;
            z=2;
        }

        slide.style.transform=
            `translate(-50%,-50%) translateX(${x}px) scale(${scale})`;

        slide.style.opacity=opacity;
        slide.style.zIndex=z;

    });

}

function next(){
    current=(current+1)%total;
    render();
}

render();

window.addEventListener("resize",render);
setInterval(next,4000);

frame.addEventListener("mouseenter",()=>{
    frame.style.borderColor=randomColor();
});

frame.addEventListener("mouseleave",()=>{
    frame.style.borderColor="#fff";
});

frame.addEventListener("click",()=>{
    window.location.href=link;
});

})();
</script>

</body>
</html>
