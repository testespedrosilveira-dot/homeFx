<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Editorial Video</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

width:100%;
height:100%;

overflow:hidden;

background:#ffffff;

font-family:Helvetica,Arial,sans-serif;

}

body{

display:flex;
justify-content:center;
align-items:center;

--mx:50%;
--my:50%;

}

/* ------------------------- */
/* LIGHT FOLLOWING THE MOUSE */
/* ------------------------- */

.light{

position:fixed;
inset:0;

pointer-events:none;

background:
radial-gradient(
circle 600px at var(--mx) var(--my),
rgba(255,255,255,.85),
rgba(255,255,255,.2) 40%,
rgba(255,255,255,0) 70%
);

mix-blend-mode:screen;

z-index:5;

}

/* ------------------------- */
/* VIGNETTE */
/* ------------------------- */

.vignette{

position:fixed;
inset:0;

pointer-events:none;

background:

radial-gradient(

circle,

rgba(255,255,255,0) 45%,

rgba(0,0,0,.045) 100%

);

z-index:6;

}

/* ------------------------- */
/* DIGITAL NOISE */
/* ------------------------- */

canvas{

position:fixed;
inset:0;

width:100%;
height:100%;

pointer-events:none;

opacity:.025;

mix-blend-mode:multiply;

z-index:4;

}

/* ------------------------- */

.sheet{

position:relative;

width:min(500px,72vw);

aspect-ratio:.71;

background:#fcfcfa;

display:flex;
justify-content:flex-start;
align-items:center;
flex-direction:column;

padding-top:78px;

box-shadow:

0 2px 6px rgba(0,0,0,.04),
0 40px 90px rgba(0,0,0,.05);

transition:
transform .12s linear;

z-index:10;

}

/* ------------------------- */

.video{

width:175px;

aspect-ratio:2 / 3;

overflow:hidden;

background:#ddd;

box-shadow:

0 10px 30px rgba(0,0,0,.08);

transition:
transform .12s linear;

}

.video iframe{

width:100%;
height:100%;

border:none;

}

</style>

</head>

<body>

<canvas id="noise"></canvas>

<div class="light"></div>

<div class="vignette"></div>

<div class="sheet">

<div class="video">

<iframe

src="https://customer-pz1quf3nakoocijj.cloudflarestream.com/1fd7b59118fcf10ef100d22f0053cecc/iframe?autoplay=true&muted=true&loop=true&controls=false"

allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"

allowfullscreen>

</iframe>

</div>

</div>

<script>

const body=document.body;
const sheet=document.querySelector(".sheet");
const video=document.querySelector(".video");

/* ------------------------- */
/* PARALLAX */
/* ------------------------- */

let tx=0;
let ty=0;

window.addEventListener("mousemove",(e)=>{

const x=e.clientX/window.innerWidth;
const y=e.clientY/window.innerHeight;

body.style.setProperty("--mx",`${x*100}%`);
body.style.setProperty("--my",`${y*100}%`);

tx=(x-.5)*18;
ty=(y-.5)*18;

sheet.style.transform=
`translate(${tx}px,${ty}px)`;

video.style.transform=
`translate(${tx*0.45}px,${ty*0.45}px)`;

});

/* ------------------------- */
/* DIGITAL GRAIN */
/* ------------------------- */

const canvas=document.getElementById("noise");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

window.addEventListener("resize",resize);

resize();

function grain(){

const img=ctx.createImageData(canvas.width,canvas.height);

const data=img.data;

for(let i=0;i<data.length;i+=4){

const v=120+Math.random()*40;

data[i]=v;
data[i+1]=v;
data[i+2]=v;
data[i+3]=10;

}

ctx.putImageData(img,0,0);

}

grain();

setInterval(grain,800);

</script>

</body>

</html>
